services:
  - type: web
    name: ai-data-dashboard-backend
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_PATH
        value: python3
      - key: CORS_ORIGIN
        value: https://your-frontend-app.vercel.app
